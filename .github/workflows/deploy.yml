name: Publicar Protege.Dados 4.1

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar projeto e dependências
        run: python -m pip install -e .

      - name: Validar release 4.1
        run: python scripts/validate_release.py

      - name: Executar testes automatizados
        run: pytest -q

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar artefato
        run: |
          mkdir -p public
          cp -R web/. public/
          cp -R docs public/docs
          cp -R evidence public/evidence
          cp -R data/processed public/data-processed

      - name: Enviar artefato do portal
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
