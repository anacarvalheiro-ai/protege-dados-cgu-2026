name: Publicar Protege.Dados 5.0

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar projeto
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validar release
        run: python scripts/validate_release.py

      - name: Validar portal completo
        run: python scripts/validate_portal.py

      - name: Validar JavaScript
        run: node --check web/assets/app.js

      - name: Executar testes Python
        run: python -m pytest -q

      - name: Preparar GitHub Pages
        run: touch web/.nojekyll

      - name: Criar artefato único
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
