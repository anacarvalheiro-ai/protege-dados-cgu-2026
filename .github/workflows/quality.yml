name: Qualidade Protege.Dados 5.1
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - run: python scripts/validate_release.py
      - run: python scripts/validate_portal.py
      - run: node --check web/assets/app.js
      - run: python -m pytest -q
