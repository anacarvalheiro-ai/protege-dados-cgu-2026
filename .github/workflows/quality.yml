name: Qualidade Protege.Dados 4.1

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar projeto e dependências
        run: python -m pip install -e .
      - name: Validar release
        run: python scripts/validate_release.py
      - name: Executar testes automatizados
        run: pytest -q
