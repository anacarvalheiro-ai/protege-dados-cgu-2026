name: Atualização programada de dados
on:
  schedule:
    - cron: '17 8 1 * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verificar catálogo e reconstruir API
        run: |
          python -m src.protege_dados.quality.validate
          python -m src.protege_dados.pipelines.build_static_api
      - name: Registrar atualização técnica
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/api/v1
          git diff --cached --quiet || git commit -m "Atualizar API estática e manifesto"
          git push
