name: Publicar Protege.Dados 4.1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar projeto e dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validar release
        run: python scripts/verificar_submissao.py

      - name: Construir API estatica
        run: python -m protege_dados.pipelines.build_static_api

      - name: Executar testes
        run: python -m pytest -q

      - name: Preservar API gerada
        uses: actions/upload-artifact@v4
        with:
          name: protege-dados-api-v1
          path: web/api/v1
          if-no-files-found: error

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar projeto e dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Construir API estatica
        run: python -m protege_dados.pipelines.build_static_api

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar portal
        shell: bash
        run: |
          touch web/.nojekyll

      - name: Enviar portal
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


