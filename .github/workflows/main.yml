name: Publicar Protege.Dados 4.0
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validar ecossistema
        run: python -m src.protege_dados.quality.validate
      - name: Construir API estática e manifesto
        run: python -m src.protege_dados.pipelines.build_static_api
      - name: Verificar links locais, imagens e JSON
        run: python scripts/verificar_submissao.py
      - name: Testes
        run: |
          python -m pip install -r requirements-dev.txt
          pytest -q
      - name: Preservar artefatos gerados
        uses: actions/upload-artifact@v4
        with:
          name: protege-dados-api-v1
          path: web/api/v1
  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m src.protege_dados.pipelines.build_static_api
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
