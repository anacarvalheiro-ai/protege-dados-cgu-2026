n@'
name: Publica release 4.1 do Protege.Dados

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Validar ecossistema
        run: python scripts/validate_release.py

      - name: Construir API estática e manifesto
        run: python -m protege_dados.pipelines.build_static_api

      - name: Verificar links locais, imagens e JSON
        run: python scripts/verificar_submissao.py

      - name: Executar testes
        run: python -m pytest -q

      - name: Preservar artefatos gerados
        uses: actions/upload-artifact@v4
        with:
          name: protege-dados-api-v1
          path: web/api/v1

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Construir API estática
        run: python -m protege_dados.pipelines.build_static_api

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Enviar portal para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
'@ | Set-Content -Encoding utf8 .github\workflows\main.yml
